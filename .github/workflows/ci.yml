name: CI - MCP Lokales Dateisystem

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install flake8 pytest

    - name: Lint with flake8 (Fehler prüfen)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Lint with flake8 (Warnungen)
      run: |
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Syntax-Prüfung (import test)
      run: |
        python -c "import py_compile; py_compile.compile('lokales_dateisystem.py', doraise=True)"

    - name: Test with pytest
      run: |
        python -m pytest --tb=short -q || true