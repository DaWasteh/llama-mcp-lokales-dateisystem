name: CI - MCP Lokales Dateisystem

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Node.js 24 opt-in (wird ab 2. Juni 2026 erzwungen, hier vorsorglich gesetzt)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# ──────────────────────────────────────────────────────────────
# Job 1: Lint + Type-Check (einmalig, schnell, OS-unabhaengig)
# ──────────────────────────────────────────────────────────────
jobs:
  lint-and-typecheck:
    name: Lint & Type-Check (Python 3.12, ubuntu)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy pyright

    - name: Ruff - Lint
      run: ruff check internet_recherche.py lokales_dateisystem.py

    - name: Ruff - Import-Order
      run: ruff check --select I --diff internet_recherche.py lokales_dateisystem.py

    - name: mypy - lokales_dateisystem.py
      run: python -m mypy lokales_dateisystem.py --no-error-summary

    - name: mypy - internet_recherche.py
      run: python -m mypy internet_recherche.py --no-error-summary

    - name: Pyright (Pylance-Engine) - lokales_dateisystem.py
      run: pyright lokales_dateisystem.py

    - name: Pyright (Pylance-Engine) - internet_recherche.py
      run: pyright internet_recherche.py

    - name: Syntax-Pruefung
      run: |
        python -c "import py_compile; py_compile.compile('lokales_dateisystem.py', doraise=True)"
        python -c "import py_compile; py_compile.compile('internet_recherche.py', doraise=True)"

# ──────────────────────────────────────────────────────────────
# Job 2: Tests (alle OS x alle Python-Versionen)
# ──────────────────────────────────────────────────────────────
  test:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: lint-and-typecheck
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest

    - name: Run tests
      run: python -m pytest tests/ --tb=short -q
