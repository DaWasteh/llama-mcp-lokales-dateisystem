name: CI - MCP Lokales Dateisystem

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install ruff mypy

    - name: Lint with Ruff
      run: |
        ruff check internet_recherche.py lokales_dateisystem.py

    - name: Import-Order check with Ruff
      run: |
        ruff check --select I --diff internet_recherche.py lokales_dateisystem.py

    - name: Run MyPy on lokales_dateisystem.py
      run: |
        python -m mypy lokales_dateisystem.py --no-error-summary

    - name: Run MyPy on internet_recherche.py
      run: |
        python -m mypy internet_recherche.py --no-error-summary

    - name: Syntax-Prüfung (import test)
      run: |
        python -c "import py_compile; py_compile.compile('lokales_dateisystem.py', doraise=True)"
        python -c "import py_compile; py_compile.compile('internet_recherche.py', doraise=True)"

    - name: Test with pytest
      run: |
        python -m pytest --tb=short -q
